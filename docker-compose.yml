version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=watchtower
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=watchtower
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=evidence
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - minio

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
      - retrieval_service

  discord_bot:
    build: ./discord_bot
    volumes:
      - ./discord_bot:/usr/src/app
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - WATCHTOWER_API_ENDPOINT=http://api:8000/v1/prompt/
      - DISCORD_MESSAGE_LIMIT=2000
    depends_on:
      - api

  retrieval_service:
    build: ./retrieval_service
    ports:
      - "3000:3000"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=evidence
    depends_on:
      - minio

volumes:
  postgres_data:
  minio_data:
